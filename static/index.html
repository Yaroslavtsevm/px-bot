<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #000; color: #fff; font-family: system-ui, sans-serif; }
    .tab-active { background: linear-gradient(90deg, #f97316, #ec4899); color: white; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: scale(1.05); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <div class="bg-black pt-4 pb-3 px-4 flex items-center justify-between border-b border-zinc-800">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-pink-500 rounded-full flex items-center justify-center text-2xl">🔥</div>
      <div>
        <span class="text-3xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</span>
      </div>
    </div>
    <button onclick="toggleLanguage()" id="langBtn"
            class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-5 py-2 rounded-3xl text-sm font-medium">
      🇷🇺 RU
    </button>
  </div>

  <!-- Tabs -->
  <div class="px-4 pt-4">
    <div class="flex bg-zinc-900 rounded-3xl p-1 shadow-inner">
      <button onclick="switchTab(0)" id="tab0" 
              class="tab flex-1 py-4 rounded-3xl font-semibold tab-active flex items-center justify-center gap-2">
        <span>🌟</span><span id="tabStars">Звезды</span>
      </button>
      <button onclick="switchTab(1)" id="tab1" 
              class="tab flex-1 py-4 rounded-3xl font-semibold flex items-center justify-center gap-2">
        <span>📂</span><span id="tabCats">Категории</span>
      </button>
      <button onclick="switchTab(2)" id="tab2" 
              class="tab flex-1 py-4 rounded-3xl font-semibold flex items-center justify-center gap-2">
        <span>💰</span><span id="tabPaid">Платное</span>
      </button>
      <button onclick="switchTab(3)" id="tab3" 
              class="tab hidden flex-1 py-4 rounded-3xl font-semibold flex items-center justify-center gap-2">
        <span>⚙️</span><span id="tabAdmin">Админ</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4">
    <div id="content0" class="tab-content grid grid-cols-2 gap-4"></div>
    <div id="content1" class="tab-content hidden grid grid-cols-2 gap-4"></div>
    <div id="content2" class="tab-content hidden space-y-6"></div>
    <div id="content3" class="tab-content hidden"></div>
  </div>

  <script>
    let currentTab = 0;
    let lang = localStorage.getItem('pxLang') || 'ru';
    let isAdmin = false;
    const ADMIN_ID = 1423028519;

    const translations = {
      ru: { stars: "Звезды", cats: "Категории", paid: "Платное", admin: "Админ" },
      en: { stars: "Stars",   cats: "Categories", paid: "Paid",   admin: "Admin" }
    };

    function t(key) {
      return translations[lang][key] || key;
    }

    function updateLangUI() {
      document.getElementById('langBtn').innerHTML = lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
      document.getElementById('tabStars').textContent = t('stars');
      document.getElementById('tabCats').textContent = t('cats');
      document.getElementById('tabPaid').textContent = t('paid');
      document.getElementById('tabAdmin').textContent = t('admin');
    }

    function toggleLanguage() {
      lang = lang === 'ru' ? 'en' : 'ru';
      localStorage.setItem('pxLang', lang);
      updateLangUI();
      loadTab(currentTab);
    }

    async function apiPost(endpoint, body = {}) {
      const token = Telegram.WebApp.initData;
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ ...body, _auth: token })
        });
        if (!res.ok) throw new Error('Unauthorized');
        return await res.json();
      } catch (e) {
        console.error(e);
        return [];
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content${tab}`).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('tab-active', i === tab);
      });

      loadTab(tab);
    }

    async function loadTab(tab) {
      let data = [];
      if (tab === 0) data = await apiPost('/api/stars');
      else if (tab === 1) data = await apiPost('/api/categories');
      else if (tab === 2) data = await apiPost('/api/paid');
      else if (tab === 3) {
        showAdminPanel();
        return;
      }

      const container = document.getElementById(`content${tab}`);
      container.innerHTML = '';

      if (tab === 0) {
        container.innerHTML = data.map(item => `
          <div onclick="openStar(${item.id}, '${item.name}', '${item.photo_url || ''}')" 
               class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            <img src="${item.photo_url || 'https://picsum.photos/id/1015/600/600'}" class="w-full aspect-square object-cover">
            <div class="p-4">
              <p class="font-semibold">${item.name}</p>
              ${item.hashtag ? `<p class="text-orange-400 text-sm">${item.hashtag}</p>` : ''}
            </div>
          </div>
        `).join('');
      } else if (tab === 1) {
        container.innerHTML = data.map(item => `
          <div onclick="alert('Контент категории ${item.name} скоро будет доступен')" 
               class="card bg-zinc-900 rounded-3xl p-8 text-center cursor-pointer hover:bg-zinc-800">
            <p class="text-xl font-medium">${item.name}</p>
          </div>
        `).join('');
      } else if (tab === 2) {
        container.innerHTML = data.map(item => `
          <div onclick="openPaid(${item.id}, '${item.file_url}', '${item.type}', '${item.caption || ''}')" 
               class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            ${item.type === 'photo' 
              ? `<img src="${item.file_url}" class="w-full">` 
              : `<video src="${item.file_url}" controls class="w-full"></video>`}
            <div class="p-4 text-sm">${item.caption || ''}</div>
          </div>
        `).join('');
      }
    }

    function showAdminPanel() {
      document.getElementById('content3').innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 text-center">
          <h2 class="text-3xl font-bold mb-6">⚙️ Админ-панель</h2>
          <p class="mb-8 text-zinc-400">Здесь будет полный CRUD</p>
          <button onclick="alert('Админка в разработке. Скоро добавим редактирование и удаление.')" 
                  class="bg-gradient-to-r from-purple-500 to-pink-500 px-10 py-4 rounded-3xl font-bold">
            Открыть расширенную админку
          </button>
        </div>`;
    }

    function openStar(id, name, photo) {
      alert(`Открыт профиль звезды: ${name}\nID: ${id}`);
      // Здесь можно открыть модальное окно с контентом звезды
    }

    function openPaid(id, fileUrl, type, caption) {
      alert(`Платный контент ID: ${id}\n${caption}`);
    }

    // Инициализация
    window.onload = () => {
      if (typeof Telegram === 'undefined' || !Telegram.WebApp) {
        console.error("Telegram WebApp not found");
        return;
      }
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();

      // Проверка админа
      const user = Telegram.WebApp.initDataUnsafe?.user;
      if (user && user.id === ADMIN_ID) {
        isAdmin = true;
        document.getElementById('tab3').classList.remove('hidden');
      }

      updateLangUI();
      switchTab(0);
    };
  </script>
</body>
</html>
