<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #000; color: #fff; }
    .tab-active { background: linear-gradient(90deg, #f97316, #ec4899) !important; color: white !important; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: scale(1.05); }
  </style>
</head>
<body class="min-h-screen pb-24">

  <!-- Header -->
  <div class="bg-black pt-4 pb-3 px-4 flex items-center justify-between border-b border-zinc-800">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 bg-gradient-to-br from-orange-500 to-pink-500 rounded-2xl flex items-center justify-center text-3xl">🔥</div>
      <span class="text-4xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</span>
    </div>
    <button onclick="toggleLanguage()" id="langBtn" class="flex items-center gap-2 bg-zinc-900 px-6 py-2.5 rounded-3xl text-sm">🇷🇺 RU</button>
  </div>

  <!-- Tabs -->
  <div class="px-4 pt-4">
    <div class="flex bg-zinc-900 rounded-3xl p-1.5">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl font-semibold tab-active">🌟 Звезды</button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl font-semibold">📂 Категории</button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl font-semibold">💰 Платное</button>
      <button onclick="switchTab(3)" id="tab3" class="tab hidden flex-1 py-4 rounded-3xl font-semibold">⚙️ Админ</button>
    </div>
  </div>

  <div class="p-4">
    <div id="content0" class="tab-content grid grid-cols-2 gap-4"></div>
    <div id="content1" class="tab-content hidden grid grid-cols-2 gap-4"></div>
    <div id="content2" class="tab-content hidden space-y-6"></div>
    <div id="content3" class="tab-content hidden"></div>
  </div>

  <!-- Sponsor -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 p-4">
    <button onclick="sponsor()" class="w-full py-6 bg-gradient-to-r from-pink-500 to-rose-500 rounded-3xl font-bold text-xl flex items-center justify-center gap-2">
      ❤️ Спонсировать (Stars)
    </button>
  </div>

  <!-- Modal for content -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-end justify-center">
    <div class="bg-zinc-950 w-full max-w-2xl rounded-t-3xl max-h-[92vh] flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl">×</button>
      </div>
      <div id="modalContent" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    </div>
  </div>

  <script>
    let currentTab = 0;
    let lang = localStorage.getItem('pxLang') || 'ru';
    const ADMIN_ID = 1423028519;

    const translations = {
      ru: {stars:"Звезды", cats:"Категории", paid:"Платное", admin:"Админ"},
      en: {stars:"Stars", cats:"Categories", paid:"Paid", admin:"Admin"}
    };

    function t(key) { return translations[lang][key] || key; }

    function updateLangUI() {
      document.getElementById('langBtn').innerHTML = lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
      document.getElementById('tabStars').textContent = t('stars');
      document.getElementById('tabCats').textContent = t('cats');
      document.getElementById('tabPaid').textContent = t('paid');
      document.getElementById('tabAdmin').textContent = t('admin');
    }

    function toggleLanguage() {
      lang = lang === 'ru' ? 'en' : 'ru';
      localStorage.setItem('pxLang', lang);
      updateLangUI();
      loadTab(currentTab);
    }

    async function apiPost(endpoint, body = {}) {
      const token = Telegram.WebApp.initData;
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams({...body, _auth: token})
      });
      return res.json();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content${tab}`).classList.remove('hidden');
      document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('tab-active', i===tab));
      loadTab(tab);
    }

    async function loadTab(tab) {
      if (tab === 3) {
        renderAdmin();
        return;
      }
      let data = await apiPost(tab === 0 ? '/api/stars' : tab === 1 ? '/api/categories' : '/api/paid');
      const container = document.getElementById(`content${tab}`);
      container.innerHTML = '';

      if (tab === 0) {
        container.innerHTML = data.map(s => `
          <div onclick="showContent('star', ${s.id}, '${s.name}')" class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            <img src="${s.photo_url || 'https://picsum.photos/id/1015/600/600'}" class="w-full aspect-square object-cover">
            <div class="p-4"><p class="font-semibold">${s.name}</p></div>
          </div>`).join('');
      } else if (tab === 1) {
        container.innerHTML = data.map(c => `
          <div onclick="showContent('category', ${c.id}, '${c.name}')" class="card bg-zinc-900 rounded-3xl p-10 text-center cursor-pointer">
            ${c.name}
          </div>`).join('');
      } else if (tab === 2) {
        container.innerHTML = data.map(p => `
          <div onclick="showContent('paid', ${p.id}, '${p.caption || 'Платный контент'}', '${p.file_url}', '${p.type}')" class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            ${p.type === 'photo' ? `<img src="${p.file_url}" class="w-full">` : `<video src="${p.file_url}" controls></video>`}
            <div class="p-4">${p.caption || ''}</div>
          </div>`).join('');
      }
    }

    async function showContent(type, id, title, fileUrl = '', fileType = '') {
      document.getElementById('modalTitle').textContent = title;
      const contentDiv = document.getElementById('modalContent');
      contentDiv.innerHTML = '<div class="text-center py-12">Загрузка...</div>';

      if (type === 'paid') {
        contentDiv.innerHTML = fileType === 'photo' 
          ? `<img src="${fileUrl}" class="w-full rounded-3xl">` 
          : `<video src="${fileUrl}" controls class="w-full rounded-3xl"></video>`;
      } else {
        const data = await apiPost('/api/content', type === 'star' ? {star_id: id} : {category_id: id});
        contentDiv.innerHTML = data.length 
          ? data.map(item => `
            <div class="mb-6">
              ${item.type === 'photo' ? `<img src="${item.file_url}" class="w-full rounded-3xl">` : `<video src="${item.file_url}" controls class="w-full rounded-3xl"></video>`}
              <p class="text-sm mt-2">${item.caption || ''}</p>
            </div>`).join('')
          : '<p class="text-center text-zinc-500">Пока нет контента</p>';
      }
      document.getElementById('modal').classList.remove('hidden');
      Telegram.WebApp.expand();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink("https://t.me/PX_MrM");
    }

    // Админка (добавление/редактирование/удаление)
    function renderAdmin() {
      document.getElementById('content3').innerHTML = `
        <div class="space-y-10">
          <div class="bg-zinc-900 rounded-3xl p-6">
            <h3 class="font-bold mb-4">⭐ Добавить звезду</h3>
            <input id="starName" placeholder="Имя" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-3">
            <input id="starHashtag" placeholder="#hashtag" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-3">
            <input id="starPhoto" placeholder="URL фото" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-3">
            <button onclick="addStar()" class="w-full bg-orange-500 py-4 rounded-3xl font-bold">Добавить звезду</button>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-6">
            <h3 class="font-bold mb-4">📂 Добавить категорию</h3>
            <input id="catName" placeholder="Название" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-3">
            <button onclick="addCategory()" class="w-full bg-pink-500 py-4 rounded-3xl font-bold">Добавить категорию</button>
          </div>
          <div class="text-center text-zinc-400 text-sm">Редактирование и удаление — в следующей версии</div>
        </div>`;
    }

    async function addStar() {
      const name = document.getElementById('starName').value.trim();
      const hashtag = document.getElementById('starHashtag').value.trim();
      const photo_url = document.getElementById('starPhoto').value.trim();
      if (!name || !hashtag) return alert("Имя и хэштег обязательны");
      const res = await apiPost('/api/admin/manage', {action: 'add_star', name, hashtag, photo_url});
      alert(res.message || "Звезда добавлена");
      loadTab(0);
    }

    async function addCategory() {
      const name = document.getElementById('catName').value.trim();
      if (!name) return alert("Введите название");
      const res = await apiPost('/api/admin/manage', {action: 'add_category', name});
      alert(res.message || "Категория добавлена");
      loadTab(1);
    }

    window.onload = () => {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();

      const user = Telegram.WebApp.initDataUnsafe?.user;
      if (user && (user.id === ADMIN_ID || user.username === "PX_MrM")) {
        document.getElementById('tab3').classList.remove('hidden');
      }

      updateLangUI();
      switchTab(0);
    };
  </script>
</body>
</html>
