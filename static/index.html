<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #050505; color: #fff; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-8px) scale(1.03); }
    .modal { animation: modalSlideUp 0.4s ease forwards; }
    @keyframes modalSlideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen pb-24">

  <div class="max-w-2xl mx-auto p-4">
    <!-- Header -->
    <div class="flex items-center justify-center gap-3 mb-10 mt-6">
      <div class="w-14 h-14 bg-gradient-to-br from-orange-500 via-pink-500 to-purple-500 rounded-3xl flex items-center justify-center text-4xl shadow-lg">🔥</div>
      <h1 class="text-6xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</h1>
    </div>

    <!-- Tabs -->
    <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl font-semibold text-lg tab-active">🌟 Звезды</button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl font-semibold text-lg">📂 Категории</button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl font-semibold text-lg">💰 Платное</button>
    </div>

    <!-- Search -->
    <div id="searchBox" class="mb-6">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-zinc-500"></i>
        <input id="searchInput" type="text" placeholder="Поиск звезды..." 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-4 pl-12 pr-6 text-lg focus:outline-none focus:border-orange-500">
      </div>
    </div>

    <!-- Content -->
    <div id="content0" class="tab-content grid grid-cols-2 gap-4"></div>
    <div id="content1" class="tab-content hidden grid grid-cols-2 gap-4"></div>
    <div id="content2" class="tab-content hidden space-y-6"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-end lg:items-center justify-center">
    <div class="modal bg-zinc-950 w-full max-w-2xl rounded-t-3xl lg:rounded-3xl overflow-hidden max-h-[92vh] flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
      </div>
      
      <div id="modalContent" class="flex-1 overflow-y-auto p-6 space-y-8"></div>

      <!-- Comments Section -->
      <div class="p-6 border-t border-zinc-800">
        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-comments"></i> Анонимные комментарии</h3>
        <div id="commentsList" class="space-y-4 max-h-60 overflow-y-auto mb-6"></div>
        
        <div class="space-y-3">
          <input id="nickname" type="text" placeholder="Ваш никнейм (анонимно)" 
                 class="w-full bg-zinc-900 rounded-2xl px-5 py-4">
          <textarea id="commentText" rows="3" placeholder="Напишите комментарий..." 
                    class="w-full bg-zinc-900 rounded-3xl px-5 py-4 resize-none"></textarea>
          <button onclick="sendComment()" 
                  class="w-full bg-gradient-to-r from-orange-500 to-pink-500 py-5 rounded-3xl font-bold text-lg active:scale-95 transition">
            Отправить анонимно
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sponsor Button -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 p-4">
    <button onclick="sponsor()" 
            class="w-full py-6 bg-gradient-to-r from-pink-500 to-rose-500 rounded-3xl font-bold text-2xl shadow-2xl">
      ❤️ Спонсировать канал
    </button>
  </div>

  <script>
    let currentContentId = null;
    let currentTab = 0;

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content${tab}`).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('tab-active', i === tab);
      });

      loadTab(tab);
    }

    async function loadTab(tab) {
      const token = Telegram.WebApp.initData;
      let endpoint = '';
      if (tab === 0) endpoint = '/api/stars';
      else if (tab === 1) endpoint = '/api/categories';
      else if (tab === 2) endpoint = '/api/paid';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({_auth: token})
        });
        const data = await res.json();
        
        if (tab === 0) renderStars(data);
        else if (tab === 1) renderCategories(data);
        else if (tab === 2) renderPaid(data);
      } catch (e) {
        console.error(e);
      }
    }

    function renderStars(stars) {
      const container = document.getElementById('content0');
      container.innerHTML = stars.map(star => `
        <div onclick="openItem(${star.id}, '${star.name}', '${star.photo_url || ''}', 'star')" 
             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="${star.photo_url || 'https://picsum.photos/id/1015/600/600'}" class="w-full aspect-square object-cover">
          <div class="p-4">
            <p class="font-semibold text-xl">${star.name}</p>
            ${star.hashtag ? `<p class="text-orange-400 text-sm">${star.hashtag}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderCategories(cats) {
      const container = document.getElementById('content1');
      container.innerHTML = cats.map(cat => `
        <div onclick="openItem(${cat.id}, '${cat.name}', '', 'category')" 
             class="card bg-zinc-900 rounded-3xl p-10 text-center text-2xl font-medium cursor-pointer hover:bg-orange-500/10">
          ${cat.name}
        </div>
      `).join('');
    }

    function renderPaid(items) {
      const container = document.getElementById('content2');
      container.innerHTML = items.map(item => `
        <div onclick="openItem(${item.id}, '${item.caption || 'Платный контент'}', '${item.file_id}', 'paid')" 
             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          ${item.type === 'photo' 
            ? `<img src="${item.file_id}" class="w-full">` 
            : `<video src="${item.file_id}" controls class="w-full aspect-video"></video>`}
          <div class="p-5 text-sm">${item.caption || ''}</div>
        </div>
      `).join('');
    }

    async function openItem(id, title, media, type) {
      currentContentId = id;
      document.getElementById('modalTitle').textContent = title;
      
      let html = '';
      if (type === 'star' || type === 'category') {
        html = `<div class="text-center text-zinc-400 py-12">Контент будет загружен автоматически из канала</div>`;
      } else if (type === 'paid') {
        html = media.includes('mp4') || media.includes('video') 
          ? `<video src="${media}" controls class="w-full rounded-2xl"></video>`
          : `<img src="${media}" class="w-full rounded-2xl">`;
      }
      
      document.getElementById('modalContent').innerHTML = html;
      await loadComments();
      document.getElementById('modal').classList.remove('hidden');
      Telegram.WebApp.expand();
    }

    async function loadComments() {
      // ... (оставил как было, можно улучшить позже)
      const token = Telegram.WebApp.initData;
      try {
        const res = await fetch('/api/comments', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({_auth: token, content_id: currentContentId})
        });
        const comments = await res.json();
        // отображение комментариев...
        document.getElementById('commentsList').innerHTML = comments.length 
          ? comments.map(c => `
            <div class="bg-zinc-900 rounded-2xl p-4">
              <div class="flex justify-between text-xs mb-1">
                <span class="text-orange-400">@${c.nickname}</span>
                <span class="text-zinc-500">${c.time}</span>
              </div>
              <p>${c.text}</p>
            </div>`).join('')
          : `<p class="text-zinc-500 text-center py-8">Пока нет комментариев...</p>`;
      } catch(e) {}
    }

    function sendComment() {
      const nickname = document.getElementById('nickname').value.trim() || 'Аноним';
      const text = document.getElementById('commentText').value.trim();
      if (!text) return;

      Telegram.WebApp.sendData(JSON.stringify({
        action: "add_comment",
        content_id: currentContentId,
        nickname: nickname,
        text: text
      }));

      document.getElementById('commentText').value = '';
      setTimeout(loadComments, 700);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink(`https://t.me/${window.personalUsername || 'твой_юзернейм'}`);
    }

    window.onload = () => {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      switchTab(0);
    };
  </script>
</body>
</html>
