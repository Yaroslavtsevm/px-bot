<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #050505; color: #fff; }
    .card:hover { transform: translateY(-8px) scale(1.03); }
    .modal { animation: modalSlideUp 0.4s ease forwards; }
    @keyframes modalSlideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="min-h-screen pb-24">

<div class="max-w-2xl mx-auto p-4">
  <div class="flex justify-between items-center mb-8 mt-6">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-pink-500 rounded-3xl flex items-center justify-center text-4xl">🔥</div>
      <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</h1>
    </div>
    <button onclick="toggleLanguage()" id="langBtn" class="bg-zinc-900 px-5 py-2 rounded-3xl">🇷🇺 RU</button>
  </div>

  <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8">
    <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl font-semibold tab-active">🌟 Звезды</button>
    <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl font-semibold">📂 Категории</button>
    <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl font-semibold">💰 Платное</button>
    <button onclick="switchTab(3)" id="tab3" class="tab hidden flex-1 py-4 rounded-3xl font-semibold">⚙️ Админ</button>
  </div>

  <div id="content0" class="tab-content grid grid-cols-2 gap-4"></div>
  <div id="content1" class="tab-content hidden grid grid-cols-2 gap-4"></div>
  <div id="content2" class="tab-content hidden space-y-6"></div>
  <div id="content3" class="tab-content hidden"></div>
</div>

<!-- Главный Modal (контент + комментарии) -->
<div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-end justify-center"> ... (оставлен как был) </div>

<!-- Админ Modal -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
  <div class="bg-zinc-950 w-full max-w-2xl rounded-3xl max-h-[90vh] overflow-hidden flex flex-col">
    <div class="p-6 border-b flex justify-between items-center">
      <h2 class="text-3xl font-bold">Админ-панель</h2>
      <button onclick="closeAdminModal()" class="text-4xl">×</button>
    </div>
    <div class="flex-1 overflow-auto p-6 space-y-10">
      <!-- Stars Management -->
      <div>
        <div class="flex justify-between mb-4">
          <h3 class="text-2xl font-semibold">Звёзды</h3>
          <button onclick="showAddStarModal()" class="bg-orange-500 px-6 py-2 rounded-3xl text-sm font-bold">+ Добавить звезду</button>
        </div>
        <div id="starsList" class="space-y-3"></div>
      </div>

      <!-- Categories Management -->
      <div>
        <div class="flex justify-between mb-4">
          <h3 class="text-2xl font-semibold">Категории</h3>
          <button onclick="showAddCategoryModal()" class="bg-pink-500 px-6 py-2 rounded-3xl text-sm font-bold">+ Добавить категорию</button>
        </div>
        <div id="catsList" class="space-y-3"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ... (все предыдущие функции loadTab, renderStars, renderCategories, renderPaid, openItem, comments и т.д. — оставлены)

  let isAdmin = false;
  const ADMIN_ID = 1423028519;

  async function apiPost(endpoint, body = {}) {
    const token = Telegram.WebApp.initData;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({...body, _auth: token})
    });
    return res.json();
  }

  // ====================== АДМИНКА ======================
  async function loadAdmin() {
    const stars = await apiPost('/api/stars', {});
    const cats = await apiPost('/api/categories', {});

    let htmlStars = stars.map(s => `
      <div class="bg-zinc-900 rounded-3xl p-5 flex justify-between items-center">
        <div>
          <div class="font-semibold">${s.name}</div>
          <div class="text-orange-400 text-sm">${s.hashtag || ''}</div>
        </div>
        <div class="flex gap-3">
          <button onclick="editStar(${s.id}, '${s.name}', '${s.hashtag||''}', '${s.photo_url||''}', '${s.description||''}')" class="text-blue-400">✏️</button>
          <button onclick="deleteStar(${s.id})" class="text-red-400">🗑</button>
        </div>
      </div>`).join('');

    let htmlCats = cats.map(c => `
      <div class="bg-zinc-900 rounded-3xl p-5 flex justify-between items-center">
        <div class="font-semibold">${c.name}</div>
        <div class="flex gap-3">
          <button onclick="editCategory(${c.id}, '${c.name}')" class="text-blue-400">✏️</button>
          <button onclick="deleteCategory(${c.id})" class="text-red-400">🗑</button>
        </div>
      </div>`).join('');

    document.getElementById('starsList').innerHTML = htmlStars || '<p class="text-zinc-500">Пока нет звёзд</p>';
    document.getElementById('catsList').innerHTML = htmlCats || '<p class="text-zinc-500">Пока нет категорий</p>';
  }

  function showAddStarModal() { /* форма добавления */ }
  function editStar(id, name, hashtag, photo_url, description) { /* форма редактирования */ }
  function deleteStar(id) { if(confirm('Удалить звезду?')) apiPost('/api/admin/manage', {action:'delete_star', id}).then(()=>loadAdmin()); }

  // Аналогично для категорий

  window.onload = () => {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    const user = Telegram.WebApp.initDataUnsafe?.user;
    if (user && user.id === ADMIN_ID) {
      isAdmin = true;
      document.getElementById('tab3').classList.remove('hidden');
    }
    switchTab(0);
  };
</script>
</body>
</html>
