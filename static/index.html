<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #050505; color: #fff; font-family: 'Inter', system-ui, sans-serif; }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-10px) scale(1.04); box-shadow: 0 25px 50px -12px rgb(249 115 22); }
    .modal { animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes modalSlideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .tab-active { background: linear-gradient(to right, #f97316, #ec4899); color: white; box-shadow: 0 10px 15px -3px rgb(249 115 22); }
    .telegram-file { max-height: 520px; object-fit: contain; width: 100%; border-radius: 20px; }
  </style>
</head>
<body class="min-h-screen pb-24">

  <div class="max-w-2xl mx-auto p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8 mt-6">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-orange-500 via-pink-500 to-purple-500 rounded-3xl flex items-center justify-center text-4xl shadow-xl">🔥</div>
        <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- Language Switch -->
        <button onclick="toggleLanguage()" id="langBtn"
                class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-5 py-2 rounded-3xl text-sm font-medium transition">
          <span id="currentLang">🇷🇺 RU</span>
        </button>
        <!-- Admin Button (visible only for you) -->
        <button onclick="openAdmin()" id="adminBtn" class="hidden flex items-center justify-center w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-3xl text-xl hover:scale-110 transition">
          ⚙️
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8 shadow-inner">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl font-semibold text-base tab-active">🌟 <span id="tabStars">Звёзды</span></button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl font-semibold text-base">📂 <span id="tabCats">Категории</span></button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl font-semibold text-base">💰 <span id="tabPaid">Платное</span></button>
      <button onclick="switchTab(3)" id="tab3" class="tab hidden flex-1 py-4 rounded-3xl font-semibold text-base">⚙️ <span id="tabAdmin">Admin</span></button>
    </div>

    <!-- Search -->
    <div class="mb-6">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-zinc-500"></i>
        <input id="searchInput" type="text" placeholder="Поиск..." 
               onkeyup="if(event.key==='Enter') filterCurrentTab()"
               class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-4 pl-12 pr-6 text-lg focus:outline-none focus:border-orange-500">
      </div>
    </div>

    <!-- Content Areas -->
    <div id="content0" class="tab-content grid grid-cols-2 gap-4"></div>
    <div id="content1" class="tab-content hidden grid grid-cols-2 gap-4"></div>
    <div id="content2" class="tab-content hidden space-y-6"></div>
    <div id="content3" class="tab-content hidden"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-end lg:items-center justify-center">
    <div class="modal bg-zinc-950 w-full max-w-2xl rounded-t-3xl lg:rounded-3xl overflow-hidden max-h-[92vh] flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
      </div>
      <div id="modalContent" class="flex-1 overflow-y-auto p-6 space-y-8"></div>

      <!-- Comments -->
      <div class="p-6 border-t border-zinc-800">
        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-comments"></i> <span id="commentsTitle">Анонимные комментарии</span></h3>
        <div id="commentsList" class="space-y-4 max-h-64 overflow-y-auto mb-6"></div>
        <div class="space-y-3">
          <input id="nickname" type="text" placeholder="Никнейм (анонимно)" class="w-full bg-zinc-900 rounded-2xl px-5 py-4">
          <textarea id="commentText" rows="3" placeholder="Напишите комментарий..." class="w-full bg-zinc-900 rounded-3xl px-5 py-4 resize-none"></textarea>
          <button onclick="sendComment()" class="w-full bg-gradient-to-r from-orange-500 to-pink-500 py-5 rounded-3xl font-bold text-lg active:scale-95 transition">Отправить анонимно</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sponsor -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 p-4">
    <button onclick="sponsor()" class="w-full py-6 bg-gradient-to-r from-pink-500 to-rose-500 rounded-3xl font-bold text-2xl shadow-2xl">❤️ Спонсировать канал</button>
  </div>

  <script>
    let currentTab = 0;
    let currentContentId = null;
    let currentType = null;
    let lang = localStorage.getItem('pxLang') || 'ru';
    let isAdmin = false;
    const ADMIN_ID = 1423028519;

    const translations = {
      ru: {
        stars: "Звёзды", cats: "Категории", paid: "Платное", admin: "Admin",
        commentsTitle: "Анонимные комментарии",
        searchPlaceholder: "Поиск...",
        noContent: "Пока нет контента в этой категории"
      },
      en: {
        stars: "Stars", cats: "Categories", paid: "Paid", admin: "Admin",
        commentsTitle: "Anonymous Comments",
        searchPlaceholder: "Search...",
        noContent: "No content yet in this category"
      }
    };

    function t(key) {
      return translations[lang][key] || key;
    }

    function updateTexts() {
      document.getElementById('tabStars').textContent = t('stars');
      document.getElementById('tabCats').textContent = t('cats');
      document.getElementById('tabPaid').textContent = t('paid');
      document.getElementById('tabAdmin').textContent = t('admin');
      document.getElementById('commentsTitle').textContent = t('commentsTitle');
      document.getElementById('searchInput').placeholder = t('searchPlaceholder');
      document.getElementById('currentLang').innerHTML = lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
    }

    function toggleLanguage() {
      lang = lang === 'ru' ? 'en' : 'ru';
      localStorage.setItem('pxLang', lang);
      updateTexts();
      loadTab(currentTab); // перезагружаем текущую вкладку
    }

    // ====================== ADMIN ======================
    function checkAdmin() {
      const user = Telegram.WebApp.initDataUnsafe?.user;
      isAdmin = user && user.id === ADMIN_ID;
      if (isAdmin) {
        document.getElementById('tab3').classList.remove('hidden');
        document.getElementById('adminBtn').classList.remove('hidden');
      }
    }

    function openAdmin() {
      switchTab(3);
    }

    // ====================== TABS & LOADING ======================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content${tab}`).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('tab-active', i === tab);
      });

      loadTab(tab);
    }

    async function loadTab(tab) {
      const token = Telegram.WebApp.initData;
      let endpoint = '';
      let body = { _auth: token };

      if (tab === 0) endpoint = '/api/stars';
      else if (tab === 1) endpoint = '/api/categories';
      else if (tab === 2) endpoint = '/api/paid';
      else if (tab === 3) {
        renderAdminPanel();
        return;
      }

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(body)
        });
        const data = await res.json();

        if (tab === 0) renderStars(data);
        else if (tab === 1) renderCategories(data);
        else if (tab === 2) renderPaid(data);
      } catch (e) { console.error(e); }
    }

    // ====================== RENDER FUNCTIONS ======================
    function renderStars(stars) {
      const container = document.getElementById('content0');
      container.innerHTML = stars.length ? stars.map(star => `
        <div onclick="openItem('star', ${star.id}, '${star.name}', '${star.photo_url || ''}', '${star.hashtag || ''}')" 
             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="${star.photo_url || 'https://picsum.photos/id/1015/600/600'}" class="w-full aspect-square object-cover">
          <div class="p-4">
            <p class="font-semibold text-xl">${star.name}</p>
            ${star.hashtag ? `<p class="text-orange-400">${star.hashtag}</p>` : ''}
          </div>
        </div>
      `).join('') : `<div class="col-span-2 text-center py-12 text-zinc-500">${t('noContent')}</div>`;
    }

    function renderCategories(cats) {
      const container = document.getElementById('content1');
      container.innerHTML = cats.length ? cats.map(cat => `
        <div onclick="openItem('category', ${cat.id}, '${cat.name}', '', '')" 
             class="card bg-zinc-900 rounded-3xl p-10 text-center text-2xl font-medium cursor-pointer hover:bg-orange-500/10">
          ${cat.name}
        </div>
      `).join('') : `<div class="col-span-2 text-center py-12 text-zinc-500">${t('noContent')}</div>`;
    }

    function renderPaid(items) {
      const container = document.getElementById('content2');
      container.innerHTML = items.length ? items.map(item => `
        <div onclick="openItem('paid', ${item.id}, '${item.caption || 'Paid content'}', '${item.file_url}', '${item.type}')" 
             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          ${item.type === 'photo' 
            ? `<img src="${item.file_url}" class="telegram-file">` 
            : `<video src="${item.file_url}" controls class="w-full rounded-t-3xl"></video>`}
          <div class="p-5 text-sm text-zinc-300">${item.caption || ''}</div>
        </div>
      `).join('') : `<div class="text-center py-12 text-zinc-500">${t('noContent')}</div>`;
    }

    function renderAdminPanel() {
      const container = document.getElementById('content3');
      container.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 text-center">
          <h2 class="text-3xl font-bold mb-6">🔧 Админ-панель</h2>
          <p class="text-zinc-400 mb-8">Добро пожаловать, хозяин 🔥</p>
          <div class="grid grid-cols-2 gap-4 text-left">
            <button onclick="alert('Функция добавления звезды будет здесь')" class="bg-zinc-800 hover:bg-zinc-700 rounded-3xl p-6 text-left">
              <i class="fa-solid fa-star text-3xl mb-3 text-orange-400"></i><br>
              <span class="font-semibold">Добавить звезду</span>
            </button>
            <button onclick="alert('Функция добавления категории будет здесь')" class="bg-zinc-800 hover:bg-zinc-700 rounded-3xl p-6 text-left">
              <i class="fa-solid fa-folder text-3xl mb-3 text-pink-400"></i><br>
              <span class="font-semibold">Добавить категорию</span>
            </button>
          </div>
          <p class="text-xs text-zinc-500 mt-10">Полная админка с CRUD будет в следующей версии 😉</p>
        </div>`;
    }

    // ====================== OPEN ITEM (no more stubs!) ======================
    async function openItem(type, id, title, mediaOrPhoto, extra) {
      currentContentId = id;
      currentType = type;
      document.getElementById('modalTitle').innerHTML = type === 'star' 
        ? `${title} <span class="text-orange-400">${extra}</span>` 
        : title;

      let html = '';
      if (type === 'paid') {
        html = mediaOrPhoto.includes('.mp4') || mediaOrPhoto.includes('video') 
          ? `<video src="${mediaOrPhoto}" controls class="w-full rounded-3xl"></video>`
          : `<img src="${mediaOrPhoto}" class="telegram-file">`;
      } else {
        // Загружаем реальный контент звезды или категории
        html = `<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-4xl"></i></div>`;
        document.getElementById('modalContent').innerHTML = html;

        const token = Telegram.WebApp.initData;
        const res = await fetch('/api/content', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ _auth: token, [`${type}_id`]: id })
        });
        const content = await res.json();

        html = content.length 
          ? content.map(item => `
            <div class="mb-8">
              ${item.type === 'photo' 
                ? `<img src="${item.file_url}" class="telegram-file">` 
                : `<video src="${item.file_url}" controls class="w-full rounded-3xl"></video>`}
              <p class="text-sm text-zinc-400 mt-3">${item.caption || ''}</p>
            </div>`).join('')
          : `<div class="text-center py-12 text-zinc-500">${t('noContent')}</div>`;
      }

      document.getElementById('modalContent').innerHTML = html;
      await loadComments();
      document.getElementById('modal').classList.remove('hidden');
      Telegram.WebApp.expand();
    }

    // ====================== COMMENTS ======================
    async function loadComments() {
      // ... (тот же код что был раньше, только с переводом)
      const token = Telegram.WebApp.initData;
      const list = document.getElementById('commentsList');
      list.innerHTML = '<div class="text-center py-8"><i class="fa-solid fa-spinner fa-spin"></i></div>';

      try {
        const res = await fetch('/api/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ _auth: token, content_id: currentContentId })
        });
        const comments = await res.json();

        list.innerHTML = comments.length 
          ? comments.map(c => `
            <div class="bg-zinc-900 rounded-2xl p-4">
              <div class="flex justify-between text-xs mb-2">
                <span class="text-orange-400">@${c.nickname}</span>
                <span class="text-zinc-500">${c.time ? c.time.slice(0,16) : ''}</span>
              </div>
              <p>${c.text}</p>
            </div>`).join('')
          : `<p class="text-zinc-500 text-center py-8">Пока нет комментариев. Будь первым!</p>`;
      } catch(e) {
        list.innerHTML = `<p class="text-red-400 text-center py-8">Ошибка загрузки</p>`;
      }
    }

    function sendComment() {
      const nickname = document.getElementById('nickname').value.trim() || 'Аноним';
      const text = document.getElementById('commentText').value.trim();
      if (!text) return;

      Telegram.WebApp.sendData(JSON.stringify({
        action: "add_comment",
        content_id: currentContentId,
        nickname, text
      }));

      document.getElementById('commentText').value = '';
      setTimeout(loadComments, 700);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink(`https://t.me/PX_MrM`);
    }

    function filterCurrentTab() {
      // простой поиск по уже загруженным элементам (можно улучшить позже)
      loadTab(currentTab);
    }

    // ====================== START ======================
    window.onload = () => {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      checkAdmin();
      updateTexts();
      switchTab(0);
    };
  </script>
</body>
</html>
