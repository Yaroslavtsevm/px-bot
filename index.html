<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PX Models</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        body { background: linear-gradient(180deg, #1a0033 0%, #000000 100%); color: white; }
        .header-text { font-family: 'Playfair Display', serif; font-size: 2.8rem; background: linear-gradient(90deg, #ff00aa, #aa00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .media-card:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,0,170,0.7); }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div class="max-w-7xl mx-auto px-4 pt-8">
        <h1 class="header-text text-center mb-10">PX Models</h1>

        <div class="mb-8">
            <input id="search-input" type="text" placeholder="Search models..." 
                   class="w-full bg-zinc-900 rounded-3xl px-6 py-4 text-lg outline-none focus:ring-2 focus:ring-pink-500">
        </div>

        <div class="flex justify-end mb-6">
            <button onclick="toggleAdminPanel()" id="admin-btn" 
                    class="hidden bg-gradient-to-r from-pink-600 to-purple-600 px-8 py-3 rounded-3xl text-white font-bold text-lg">
                👑 Admin Panel
            </button>
        </div>

        <div id="main-content" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Sponsorship -->
    <a href="https://t.me/PX_MrM" target="_blank"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gradient-to-r from-pink-500 to-purple-600 text-white px-10 py-5 rounded-3xl shadow-2xl flex items-center gap-4 text-xl font-bold z-50">
        <span class="text-3xl">⭐</span>
        <div>Sponsorship <span class="text-sm opacity-90">@PX_MrM • Stars</span></div>
    </a>

    <!-- Админ панель -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg max-h-[90vh] overflow-auto">
            <div class="p-6 border-b border-zinc-700 flex justify-between bg-zinc-950">
                <h2 class="text-3xl font-bold">👑 Admin Panel</h2>
                <button onclick="toggleAdminPanel()" class="text-4xl text-pink-400">✕</button>
            </div>

            <div class="p-6">
                <form id="add-model-form" class="space-y-6">
                    <div>
                        <label class="block text-sm mb-2">Model Name</label>
                        <input type="text" id="model-name" placeholder="Enter model name" 
                               class="w-full bg-zinc-800 p-4 rounded-2xl" required>
                    </div>
                    <div>
                        <label class="block text-sm mb-2">Cover Photo</label>
                        <input type="file" id="model-cover" accept="image/*" 
                               class="w-full bg-zinc-800 p-4 rounded-2xl" required>
                    </div>
                    <div>
                        <label class="block text-sm mb-2">Hashtag</label>
                        <input type="text" id="model-hashtag" placeholder="#AaliyahLove" 
                               class="w-full bg-zinc-800 p-4 rounded-2xl">
                    </div>
                    <button type="submit" 
                            class="w-full bg-pink-600 hover:bg-pink-700 py-5 rounded-3xl font-bold text-lg">
                        Add Model
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const initData = window.Telegram?.WebApp?.initData || '';

        function checkAdminMode() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'true') {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        async function fetchAndRender() {
            const res = await fetch('/api/models?limit=50');
            if (!res.ok) return;
            const data = await res.json();
            renderModels(data.items);
        }

        function renderModels(models) {
            const container = document.getElementById('main-content');
            let html = '';
            models.forEach(model => {
                const title = model.name_ru || 'Unnamed';
                const image = model.cover_url || 'https://via.placeholder.com/400x300/1a0033/ffffff?text=No+Image';
                html += `
                    <div class="media-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer" 
                         onclick="openChannel('${model.hashtags || ''}')">
                        <img src="${image}" class="w-full aspect-[4/3] object-cover">
                        <div class="p-4 text-center">
                            <p class="font-medium">${title}</p>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="text-center text-gray-400 py-12">No models yet</p>';
        }

        function openChannel(hashtags) {
            let url = "https://t.me/+u8svaG24-xo5MDMy";
            if (hashtags) url += `?q=${encodeURIComponent(hashtags)}`;
            window.open(url, "_blank");
        }

        function toggleAdminPanel() {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }

        // Добавление модели
        document.getElementById('add-model-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('initData', initData);
            formData.append('name_ru', document.getElementById('model-name').value.trim());
            formData.append('hashtags', document.getElementById('model-hashtag').value.trim());
            formData.append('cover', document.getElementById('model-cover').files[0]);

            try {
                const res = await fetch('/api/models', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    alert('Model added successfully!');
                    document.getElementById('add-model-form').reset();
                    fetchAndRender();
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Error: ' + (err.detail || 'Unknown error'));
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        });

        window.onload = () => {
            if (window.Telegram?.WebApp) window.Telegram.WebApp.expand();
            checkAdminMode();
            fetchAndRender();
        };
    </script>
</body>
</html>
