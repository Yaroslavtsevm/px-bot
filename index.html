<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PX Models</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        body { 
            background: linear-gradient(180deg, #1a0033 0%, #000000 100%); 
            color: white; 
        }
        .header-text { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.8rem; 
            background: linear-gradient(90deg, #ff00aa, #aa00ff, #00ffff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .media-card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 25px rgba(255,0,170,0.7); 
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div class="max-w-7xl mx-auto px-4 pt-8">
        <h1 class="header-text text-center mb-10">PX Models</h1>

        <div class="mb-8">
            <input id="search-input" type="text" placeholder="Search models..." 
                   class="w-full bg-zinc-900 rounded-3xl px-6 py-4 text-lg outline-none focus:ring-2 focus:ring-pink-500">
        </div>

        <!-- Кнопка админа -->
        <div class="flex justify-end mb-6">
            <button onclick="toggleAdminPanel()" id="admin-btn" 
                    class="bg-gradient-to-r from-pink-600 to-purple-600 px-8 py-3 rounded-3xl text-white font-bold text-lg">
                👑 Admin Panel
            </button>
        </div>

        <div id="main-content" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Sponsorship -->
    <a href="https://t.me/PX_MrM" target="_blank"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gradient-to-r from-pink-500 to-purple-600 text-white px-10 py-5 rounded-3xl shadow-2xl flex items-center gap-4 text-xl font-bold z-50">
        <span class="text-3xl">⭐</span>
        <div>Sponsorship <span class="text-sm opacity-90">@PX_MrM • Stars</span></div>
    </a>

    <!-- Админ-панель -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-5xl max-h-[94vh] overflow-hidden">
            <div class="p-6 border-b border-zinc-700 flex justify-between items-center bg-zinc-950">
                <h2 class="text-3xl font-bold">👑 Admin Panel</h2>
                <button onclick="toggleAdminPanel()" class="text-4xl text-pink-400">✕</button>
            </div>

            <div class="p-6 overflow-auto" style="max-height: calc(94vh - 80px);">
                <!-- Форма добавления -->
                <div class="bg-zinc-800 rounded-3xl p-6 mb-10">
                    <h3 class="text-xl font-bold mb-4">Add New Model</h3>
                    <form id="add-model-form" class="space-y-4">
                        <input type="text" id="model-name" placeholder="Model Name *" 
                               class="w-full bg-zinc-900 p-4 rounded-2xl" required>
                        <input type="file" id="model-cover" accept="image/*" 
                               class="w-full bg-zinc-900 p-4 rounded-2xl" required>
                        <input type="text" id="model-hashtags" placeholder="#hashtag1 #hashtag2" 
                               class="w-full bg-zinc-900 p-4 rounded-2xl">
                        <button type="submit" 
                                class="w-full bg-pink-600 hover:bg-pink-700 py-4 rounded-3xl font-bold text-lg">
                            Add Model
                        </button>
                    </form>
                </div>

                <!-- Список моделей -->
                <div id="admin-list" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentSearch = '';
        const initData = window.Telegram?.WebApp?.initData || '';
        const CHANNEL_LINK = "https://t.me/+u8svaG24-xo5MDMy";

        function checkAdminMode() {
            const params = new URLSearchParams(window.location.search);
            // Показываем кнопку админа, если в ссылке есть параметр admin=true
            if (params.get('admin') === 'true' || window.location.href.includes('admin=true')) {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        async function fetchAndRender() {
            const params = new URLSearchParams({ page: currentPage, limit: 20, search: currentSearch });
            const res = await fetch(`/api/models?${params}`);
            if (!res.ok) return;
            const data = await res.json();
            renderModels(data.items);
        }

        function renderModels(models) {
            const container = document.getElementById('main-content');
            let html = '';
            models.forEach(model => {
                const title = model.name_ru || model.name_en || 'Model';
                const image = model.cover_url || 'https://via.placeholder.com/400x300/1a0033/ffffff?text=No+Image';
                
                html += `
                    <div class="media-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer" 
                         onclick="openModelChannel('${model.hashtags || ''}')">
                        <img src="${image}" class="w-full aspect-[4/3] object-cover" alt="${title}">
                        <div class="p-4 text-center">
                            <p class="font-medium text-lg">${title}</p>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="col-span-full text-center text-gray-400 py-12">No models yet</p>';
        }

        function openModelChannel(hashtags) {
            let url = CHANNEL_LINK;
            if (hashtags && hashtags.trim() !== '') {
                url += `?q=${encodeURIComponent(hashtags.trim())}`;
            }
            window.open(url, "_blank");
        }

        function toggleAdminPanel() {
            document.getElementById('admin-panel').classList.toggle('hidden');
            if (!document.getElementById('admin-panel').classList.contains('hidden')) {
                loadAdminModels();
            }
        }

        async function loadAdminModels() {
            const res = await fetch('/api/models?limit=100');
            const data = await res.json();
            const models = data.items || [];

            let html = '';
            models.forEach(model => {
                html += `
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xl font-medium">${model.name_ru || model.name_en}</p>
                                <p class="text-pink-400 text-sm">${model.hashtags || ''}</p>
                            </div>
                            <button onclick="deleteModel(${model.id})" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-2xl text-sm">Delete</button>
                        </div>
                    </div>`;
            });

            document.getElementById('admin-list').innerHTML = html || '<p class="text-gray-400 text-center py-10">No models yet</p>';
        }

        async function deleteModel(id) {
            if (!confirm('Delete this model?')) return;
            await fetch(`/api/models/${id}`, { method: 'DELETE' });
            loadAdminModels();
        }

        // Добавление модели
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('add-model-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData();
                formData.append('initData', initData);
                formData.append('name_ru', document.getElementById('model-name').value.trim());
                formData.append('name_en', '');
                formData.append('hashtags', document.getElementById('model-hashtags').value.trim());
                formData.append('cover', document.getElementById('model-cover').files[0]);

                try {
                    const res = await fetch('/api/models', { method: 'POST', body: formData });
                    if (res.ok) {
                        alert('Model added successfully!');
                        document.getElementById('add-model-form').reset();
                        loadAdminModels();
                        fetchAndRender();
                    } else {
                        alert('Error adding model');
                    }
                } catch (err) {
                    alert('Connection error');
                }
            });
        });

        // Инициализация
        window.onload = () => {
            if (window.Telegram?.WebApp) window.Telegram.WebApp.expand();
            checkAdminMode();
            fetchAndRender();
        };
    </script>
</body>
</html>
